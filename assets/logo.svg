<svg viewBox="0 0 120 120" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Salisco">
  <defs>
    <linearGradient id="steel" x1=".15" y1="0" x2=".85" y2="1">
      <stop offset="0" stop-color="#f7faff"/>
      <stop offset=".5" stop-color="#d2e0f1"/>
      <stop offset="1" stop-color="#9bb8db"/>
    </linearGradient>
    <linearGradient id="blue" x1=".1" y1="0" x2=".9" y2="1">
      <stop offset="0" stop-color="#3a86e6"/>
      <stop offset=".45" stop-color="#0055b4"/>
      <stop offset="1" stop-color="#013d82"/>
    </linearGradient>
    <linearGradient id="bottomblue" x1="0" y1="0" x2=".8" y2="1">
      <stop offset="0" stop-color="#0a5cba"/>
      <stop offset="1" stop-color="#00336d"/>
    </linearGradient>
    <linearGradient id="orange" x1=".1" y1="0" x2=".8" y2="1">
      <stop offset="0" stop-color="#ff8636"/>
      <stop offset=".5" stop-color="#ce5c17"/>
      <stop offset="1" stop-color="#a8430f"/>
    </linearGradient>
  </defs>
  <!-- orange under-fold (ribbon underside, bottom-right) -->
  <path d="M56,71 L104,71 L90,106 L60,99 Z" fill="url(#orange)" stroke="url(#orange)" stroke-width="6" stroke-linejoin="round"/>
  <path d="M58,73 L100,73 L95,81 L58,80 Z" fill="#ffffff" opacity=".16"/>
  <!-- top metallic band -->
  <path d="M40,18 L100,18 L82,43 L22,43 Z" fill="url(#steel)" stroke="url(#steel)" stroke-width="6" stroke-linejoin="round"/>
  <!-- middle royal-blue diagonal -->
  <path d="M22,43 L82,43 L99,70 L39,70 Z" fill="url(#blue)" stroke="url(#blue)" stroke-width="6" stroke-linejoin="round"/>
  <!-- bottom blue band -->
  <path d="M39,70 L99,70 L80,95 L20,95 Z" fill="url(#bottomblue)" stroke="url(#bottomblue)" stroke-width="6" stroke-linejoin="round"/>
  <!-- bevel highlights & shadow strips for depth -->
  <path d="M40,18 L100,18 L96,24 L36,24 Z" fill="#ffffff" opacity=".5"/>
  <path d="M22,43 L82,43 L79,48 L19,48 Z" fill="#7fa8e0" opacity=".5"/>
  <path d="M39,70 L99,70 L96,75 L36,75 Z" fill="#5aa0ef" opacity=".35"/>
  <path d="M20,95 L80,95 L78,91 L18,91 Z" fill="#001a3a" opacity=".4"/>
</svg>
